    <script src="https://cdn.tailwindcss.com"></script>

      tailwind.config = {
        darkMode: 'class',

    <style>

        .cyber-grid {
            background-image: 
                linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),

            background-size: 40px 40px;
